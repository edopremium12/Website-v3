<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suit Online - Arena Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: radial-gradient(circle, #1a1a2e 0%, #16213e 100%); color: white; min-height: 100-vh; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-grad { background: linear-gradient(45deg, #00d2ff 0%, #3a7bd5 100%); transition: 0.3s; }
        .btn-grad:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0, 210, 255, 0.4); }
        .hidden-view { display: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="view-auth" class="max-w-md mx-auto mt-10 p-8 glass rounded-2xl shadow-2xl">
        <h2 id="auth-title" class="text-3xl font-extrabold mb-6 text-center text-cyan-400">Login Arena</h2>
        
        <div id="register-fields" class="hidden-view">
            <input type="text" id="reg-name" placeholder="Nama Lengkap" class="w-full mb-4 p-3 rounded bg-gray-800 border border-gray-700 outline-none focus:border-cyan-500">
            <input type="text" id="reg-city" placeholder="Kota Asal" class="w-full mb-4 p-3 rounded bg-gray-800 border border-gray-700 outline-none focus:border-cyan-500">
        </div>
        
        <input type="email" id="auth-email" placeholder="Email" class="w-full mb-4 p-3 rounded bg-gray-800 border border-gray-700 outline-none focus:border-cyan-500">
        <input type="password" id="auth-pass" placeholder="Password" class="w-full mb-4 p-3 rounded bg-gray-800 border border-gray-700 outline-none focus:border-cyan-500">
        
        <div id="confirm-pass-field" class="hidden-view">
            <input type="password" id="reg-confirm-pass" placeholder="Konfirmasi Password" class="w-full mb-6 p-3 rounded bg-gray-800 border border-gray-700 outline-none focus:border-cyan-500">
        </div>

        <button id="btn-main-auth" class="w-full btn-grad p-3 rounded-xl font-bold uppercase tracking-wider">Masuk</button>
        
        <p class="mt-6 text-center text-sm text-gray-400">
            <span id="auth-toggle-text">Belum punya akun?</span> 
            <a href="#" id="auth-toggle-btn" class="text-cyan-400 hover:underline">Daftar Sekarang</a>
        </p>
    </div>

    <div id="view-dashboard" class="hidden-view max-w-4xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 glass p-6 rounded-2xl">
            <div>
                <h1 class="text-2xl font-bold">Halo, <span id="user-display-name" class="text-cyan-400">...</span></h1>
                <p class="text-gray-400 text-sm">Win Rate: <span id="user-wins" class="font-bold text-yellow-400">0</span> Kemenangan</p>
            </div>
            <button id="btn-logout" class="mt-4 md:mt-0 bg-red-500/20 hover:bg-red-500 text-red-500 hover:text-white px-4 py-2 rounded-lg transition">Logout</button>
        </div>

        <div class="grid md:grid-cols-3 gap-6">
            <div class="glass p-6 rounded-2xl h-fit">
                <h3 class="text-xl font-bold mb-4">Buat Room Baru</h3>
                <input type="text" id="room-name" placeholder="Nama Room" class="w-full mb-4 p-2 rounded bg-gray-800 border border-gray-700">
                <input type="password" id="room-pin" placeholder="PIN (Kosongkan jika Publik)" class="w-full mb-4 p-2 rounded bg-gray-800 border border-gray-700">
                <button id="btn-create-room" class="w-full btn-grad p-2 rounded-lg font-bold">BUAT & MASUK</button>
            </div>

            <div class="md:col-span-2 glass p-6 rounded-2xl">
                <h3 class="text-xl font-bold mb-4 flex justify-between">
                    Room Tersedia 
                    <span class="text-xs bg-cyan-500 text-white px-2 py-1 rounded-full animate-pulse">LIVE</span>
                </h3>
                <div id="room-list" class="grid gap-4 max-h-[400px] overflow-y-auto pr-2">
                    </div>
            </div>
        </div>
    </div>

    <div id="view-game" class="hidden-view max-w-5xl mx-auto">
        <div class="text-center mb-8">
            <h2 id="game-room-title" class="text-3xl font-black text-cyan-400">ROOM: ...</h2>
            <button id="btn-leave-room" class="text-sm text-gray-400 hover:text-red-400 mt-2 underline">Keluar Room</button>
        </div>

        <div class="flex flex-col md:flex-row justify-around items-center gap-10">
            <div id="player-you" class="text-center p-8 glass rounded-3xl w-full md:w-1/3 border-2 border-cyan-500">
                <p class="text-gray-400 mb-2">ANDA</p>
                <h4 id="player-you-name" class="text-xl font-bold mb-4">-</h4>
                <div class="grid grid-cols-3 gap-2" id="controls">
                    <button onclick="makeChoice('batu')" class="p-3 bg-gray-800 rounded hover:bg-cyan-600 transition text-2xl">✊</button>
                    <button onclick="makeChoice('kertas')" class="p-3 bg-gray-800 rounded hover:bg-cyan-600 transition text-2xl">✋</button>
                    <button onclick="makeChoice('gunting')" class="p-3 bg-gray-800 rounded hover:bg-cyan-600 transition text-2xl">✌️</button>
                </div>
                <div id="your-choice-display" class="mt-6 text-5xl">?</div>
            </div>

            <div class="text-5xl font-black italic text-gray-600">VS</div>

            <div id="player-opponent" class="text-center p-8 glass rounded-3xl w-full md:w-1/3">
                <p class="text-gray-400 mb-2">LAWAN</p>
                <h4 id="player-opponent-name" class="text-xl font-bold mb-4">Menunggu...</h4>
                <div id="opponent-status" class="text-sm text-cyan-400 animate-bounce">...</div>
                <div id="opponent-choice-display" class="mt-6 text-5xl italic text-gray-500">?</div>
            </div>
        </div>

        <div id="result-overlay" class="mt-10 text-center hidden-view">
            <h3 id="game-result-text" class="text-4xl font-black mb-4">MENANG!</h3>
            <button onclick="resetGame()" class="btn-grad px-8 py-3 rounded-full font-bold">MAIN LAGI</button>
        </div>
    </div>
<audio id="snd-win" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3"></audio>
<audio id="snd-lose" src="https://assets.mixkit.co/active_storage/sfx/2004/2004-preview.mp3"></audio>
<audio id="snd-level-up" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3"></audio>
    <script type="module" src="./assets/app.js"></script>
</body>
</html>
